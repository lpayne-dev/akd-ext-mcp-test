<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMR CARE Chat</title>
    <style>
      :root {
        --ink: #1c1f24;
        --muted: #5a6472;
        --accent: #0f766e;
        --accent-2: #cc6b2c;
        --paper: #f7f3ea;
        --paper-2: #fffaf2;
        --border: #e3dccf;
        --shadow: rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Space Grotesk", "Fira Sans", "IBM Plex Sans", sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, #ffe9d6, transparent 60%),
          radial-gradient(900px 500px at 100% 0%, #dff4f1, transparent 55%),
          linear-gradient(180deg, #f8f1e5 0%, #fefcf8 70%);
        min-height: 100vh;
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 20px 48px;
        display: grid;
        gap: 20px;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 14px;
        max-width: 520px;
      }

      .status {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--paper);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
      }

      .panel {
        background: var(--paper-2);
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px var(--shadow);
        overflow: hidden;
      }

      .chat {
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: 70vh;
      }

      .messages {
        padding: 24px;
        overflow-y: auto;
        max-height: 70vh;
      }

      .message {
        margin-bottom: 16px;
        display: grid;
        gap: 8px;
        animation: rise 220ms ease-out;
      }

      .message .meta {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1.4px;
      }

      .bubble {
        padding: 14px 16px;
        border-radius: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.markdown {
        white-space: normal;
      }

      .bubble.markdown h1,
      .bubble.markdown h2,
      .bubble.markdown h3 {
        margin: 0 0 10px 0;
        line-height: 1.25;
      }

      .bubble.markdown h2 {
        font-size: 18px;
      }

      .bubble.markdown h3 {
        font-size: 16px;
      }

      .bubble.markdown p {
        margin: 0 0 10px 0;
      }

      .bubble.markdown ul,
      .bubble.markdown ol {
        margin: 0 0 10px 18px;
        padding: 0;
      }

      .bubble.markdown code {
        font-family: "JetBrains Mono", "Fira Code", monospace;
        background: rgba(15, 118, 110, 0.08);
        padding: 2px 4px;
        border-radius: 6px;
      }

      .bubble.markdown pre {
        background: rgba(15, 118, 110, 0.08);
        padding: 12px;
        border-radius: 10px;
        overflow-x: auto;
      }

      .bubble.user {
        background: #e3f7e7;
        color: #1c3c24;
        border: 1px solid #b8e6c4;
      }

      .bubble.assistant {
        background: #e8f5f3;
        color: #0b3d3a;
        border: 1px solid #cbe7e3;
      }

      .bubble.system {
        background: #fff6e8;
        color: #7b4b20;
        border: 1px dashed #e8caa4;
      }

      .bubble.attention {
        border: 2px solid #dc2626;
        box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.18), 0 12px 24px rgba(220, 38, 38, 0.22);
        animation: glow 1.4s ease-in-out infinite;
      }

      .bubble.error {
        background: #fbe9e9;
        color: #7c1d1d;
        border: 1px solid #f4b4b4;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        gap: 12px;
        background: #fff;
      }

      .input {
        flex: 1;
        display: flex;
        gap: 10px;
      }

      textarea {
        flex: 1;
        min-height: 44px;
        max-height: 120px;
        resize: vertical;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-family: inherit;
        font-size: 14px;
        background: #fff;
      }

      button {
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(15, 118, 110, 0.2);
      }

      button.secondary {
        background: transparent;
        color: var(--accent);
        border-color: var(--accent);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .footnote {
        padding: 10px 16px 16px;
        font-size: 12px;
        color: var(--muted);
      }

      .footnote.event-glow {
        color: #1d4ed8;
        text-shadow: 0 0 12px rgba(37, 99, 235, 0.35);
        animation: pulseBlue 1.1s ease-in-out;
      }

      .tool-card {
        background: #fffdf8;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .typing {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        animation: pulse 1s infinite ease-in-out;
      }

      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes rise {
        from { transform: translateY(6px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.1); }
      }

      @keyframes glow {
        0%, 100% { box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.12), 0 10px 20px rgba(220, 38, 38, 0.18); }
        50% { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.26), 0 16px 28px rgba(220, 38, 38, 0.3); }
      }

      @keyframes pulseBlue {
        0%, 100% { opacity: 0.75; }
        50% { opacity: 1; }
      }

      @media (max-width: 700px) {
        .messages {
          max-height: 60vh;
        }
        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div>
          <div class="title">CMR CARE Chat</div>
          <div class="subtitle">Stream NASA CMR dataset discovery results, answer clarifying questions, and inspect structured outputs.</div>
        </div>
        <div class="status" id="status">Session: not started</div>
      </header>

      <section class="panel chat">
        <div class="messages" id="messages"></div>
        <div class="toolbar">
          <div class="input">
            <textarea id="prompt" placeholder="Ask about Earth science datasets..."></textarea>
            <button id="send">Send</button>
          </div>
          <button id="newChat" class="secondary">New chat</button>
        </div>
        <div class="footnote" id="footnote">Ready.</div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script>
      const messages = document.getElementById("messages");
      const promptInput = document.getElementById("prompt");
      const sendBtn = document.getElementById("send");
      const newChatBtn = document.getElementById("newChat");
      const status = document.getElementById("status");
      const footnote = document.getElementById("footnote");

      let sessionId = null;
      let pendingToolCallId = null;
      let streaming = false;
      let currentAssistant = null;
      let autoScroll = true;
      let eventCounter = 0;

      function setStatus(text) {
        status.textContent = text;
      }

      function updateEventStatus(label, title = "") {
        eventCounter += 1;
        const suffix = title ? ` ${title}` : "";
        footnote.textContent = `${label}${suffix} Event #${eventCounter}`;
        footnote.classList.remove("event-glow");
        void footnote.offsetWidth;
        footnote.classList.add("event-glow");
      }

      function scrollToBottom() {
        if (!autoScroll) return;
        messages.scrollTop = messages.scrollHeight;
      }

      function updateAutoScroll() {
        const threshold = 80;
        const distanceFromBottom = messages.scrollHeight - messages.scrollTop - messages.clientHeight;
        autoScroll = distanceFromBottom < threshold;
      }

      function renderMarkdown(target, rawText) {
        if (!window.marked || !window.DOMPurify) {
          target.textContent = rawText;
          return;
        }
        const html = marked.parse(rawText || "", { breaks: true, mangle: false, headerIds: false });
        target.innerHTML = DOMPurify.sanitize(html);
      }

      function createMessage(role, content, metaLabel, asMarkdown = false, extraClass = "") {
        const wrapper = document.createElement("div");
        wrapper.className = "message";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = metaLabel || role;
        wrapper.appendChild(meta);

        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        if (extraClass) {
          bubble.classList.add(extraClass);
        }
        if (asMarkdown) {
          bubble.classList.add("markdown");
          bubble.dataset.raw = content || "";
          renderMarkdown(bubble, bubble.dataset.raw);
        } else {
          bubble.textContent = content || "";
        }
        wrapper.appendChild(bubble);

        messages.appendChild(wrapper);
        scrollToBottom();
        return bubble;
      }

      function createToolCard(content) {
        const wrapper = document.createElement("div");
        wrapper.className = "message";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = "tool";
        wrapper.appendChild(meta);

        const card = document.createElement("div");
        card.className = "tool-card";
        card.textContent = content;
        wrapper.appendChild(card);

        messages.appendChild(wrapper);
        scrollToBottom();
      }

      function setStreamingState(isStreaming) {
        streaming = isStreaming;
        sendBtn.disabled = isStreaming;
        promptInput.disabled = isStreaming;
      }

      function startAssistantStream() {
        currentAssistant = createMessage("assistant", "", "assistant", true);
        const typing = document.createElement("span");
        typing.className = "typing";
        typing.innerHTML = "<span class=\"dot\"></span><span class=\"dot\"></span><span class=\"dot\"></span>";
        currentAssistant.appendChild(typing);
      }

      function appendAssistant(text) {
        if (!currentAssistant) {
          startAssistantStream();
        }
        const typing = currentAssistant.querySelector(".typing");
        if (typing) typing.remove();
        const raw = (currentAssistant.dataset.raw || "") + (text || "");
        currentAssistant.dataset.raw = raw;
        renderMarkdown(currentAssistant, raw);
        scrollToBottom();
      }

      function finalizeAssistant() {
        currentAssistant = null;
      }

      async function streamChat(payload) {
        setStreamingState(true);
        footnote.textContent = "Streaming...";

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok || !response.body) {
          createMessage("error", `Server error (${response.status})`, "error");
          setStreamingState(false);
          footnote.textContent = "Ready.";
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const chunks = buffer.split("\n\n");
          buffer = chunks.pop() || "";

          for (const chunk of chunks) {
            const lines = chunk.split("\n");
            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const raw = line.replace(/^data:\s*/, "");
              if (!raw) continue;
              try {
                const event = JSON.parse(raw);
                handleEvent(event);
              } catch (err) {
                console.warn("Bad event", err, raw);
              }
            }
          }
        }

        setStreamingState(false);
        footnote.textContent = pendingToolCallId ? "Awaiting your answer." : "Ready.";
      }

      function handleEvent(event) {
        const type = event.type || "";

        if (type === "session") {
          sessionId = event.session_id;
          setStatus(`Session: ${sessionId}`);
          updateEventStatus("Session created.", "Session");
          return;
        }

        if (type === "token") {
          appendAssistant(event.text || "");
          return;
        }

        if (type === "thinking") {
          updateEventStatus("Thinking...", "ThinkingEvent");
          return;
        }

        if (type === "tool_call") {
          createToolCard(`Tool call: ${event.tool_name}`);
          updateEventStatus("Tool call.", "ToolCallingEvent");
          return;
        }

        if (type === "tool_result") {
          createToolCard(`Tool result: ${event.tool_name}`);
          updateEventStatus("Tool result.", "ToolResultEvent");
          return;
        }

        if (type === "partial_output") {
          if (!event.output) return;
          createToolCard("Partial output received.");
          updateEventStatus("Partial output.", "PartialOutputEvent");
          return;
        }

        if (type === "human_input_required") {
          const question = event.question || "Input required.";
          pendingToolCallId = event.tool_call_id || null;
          createMessage("system", question, "clarify", false, "attention");
          finalizeAssistant();
          updateEventStatus("Human input required.", "HumanInputRequiredEvent");
          return;
        }

        if (type === "completed") {
          finalizeAssistant();
          pendingToolCallId = null;
          const output = event.output || {};
          let report = output.report || "";
          if (!report && output.report === "") {
            report = "(Empty report)";
          }
          if (report) {
            createMessage("assistant", report, "report", true);
          }
          if (Array.isArray(output.dataset_concept_ids)) {
            createMessage("assistant", output.dataset_concept_ids.join("\n"), "concept ids");
          }
          updateEventStatus("Completed.", "CompletedEvent");
          return;
        }

        if (type === "failed") {
          finalizeAssistant();
          createMessage("error", event.message || "Failed", "error");
          pendingToolCallId = null;
          updateEventStatus("Failed.", "FailedEvent");
          return;
        }
      }

      sendBtn.addEventListener("click", async () => {
        const text = promptInput.value.trim();
        if (!text) return;
        promptInput.value = "";

        const payload = {
          session_id: sessionId,
          message: text
        };

        if (pendingToolCallId) {
          payload.mode = "human";
          payload.tool_call_id = pendingToolCallId;
          createMessage("user", text, "clarification");
        } else {
          createMessage("user", text, "user");
        }

        await streamChat(payload);
      });

      newChatBtn.addEventListener("click", () => {
        sessionId = null;
        pendingToolCallId = null;
        currentAssistant = null;
        eventCounter = 0;
        messages.innerHTML = "";
        setStatus("Session: not started");
        footnote.textContent = "Ready.";
      });

      messages.addEventListener("scroll", updateAutoScroll);

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendBtn.click();
        }
      });
    </script>
  </body>
</html>
